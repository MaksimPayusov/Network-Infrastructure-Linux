{
    "Dhcp4": {
        // Настройка интерфейсов, на которых Kea будет слушать DHCP-запросы
        "interfaces-config": {
            "interfaces": [ "enp0s9" ]
        },

        // База данных аренд (leases)
        "lease-database": {
            "type": "memfile",
            "persist": true,
            "name": "/var/lib/kea/kea-leases4.csv",
            "lfc-interval": 3600
        },

        // Время жизни аренды в секундах (1 час)
        "valid-lifetime": 3600,

        // Обновление аренды через 50% времени (30 минут)
        "renew-timer": 1800,

        // Перепривязка через 75% времени (45 минут)
        "rebind-timer": 2700,

        // Глобальные опции (применяются ко всем подсетям)
        "option-data": [
            {
                "name": "domain-name-servers",
                "data": "10.0.0.2"
            },
            {
                "name": "domain-name",
                "data": "lab.local"
            }
        ],

        // Определение подсети
        "subnet4": [
            {
                "id": 1,
                "subnet": "10.0.0.0/24",
                "pools": [
                    {
                        "pool": "10.0.0.100 - 10.0.0.200"
                    }
                ],
                "option-data": [
                    {
                        "name": "routers",
                        "data": "10.0.0.1"
                    }
                ]
            }
        ],

	"dhcp-ddns": {
		"enable-updates": true
	},

        // Настройка логирования
        "loggers": [
            {
                "name": "kea-dhcp4",
                "output_options": [
                    {
                        "output": "syslog",
                        "pattern": "%-5p %m\n"
                    }
                ],
                "severity": "INFO"
            }
        ]
    }
}
